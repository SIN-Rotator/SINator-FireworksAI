<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="340" viewBox="0 0 1400 340" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0E14"/>
      <stop offset="0.4" stop-color="#0D1520"/>
      <stop offset="0.8" stop-color="#101926"/>
      <stop offset="1" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="100" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F4F5"/>
      <stop offset="0.6" stop-color="#E4E4E7"/>
      <stop offset="1" stop-color="#A1A1AA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B3FE4"/>
      <stop offset="1" stop-color="#00D9FF"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1400" y2="0">
      <stop stop-color="#7B3FE4" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#7B3FE4" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#00D9FF" stop-opacity="0.6"/>
      <stop offset="0.85" stop-color="#7B3FE4" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#00D9FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.8" fill="#1A2332"/>
      <line x1="25" y1="0" x2="25" y2="50" stroke="#1A2332" stroke-width="0.3"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#1A2332" stroke-width="0.3"/>
    </pattern>
    <!-- Terminal dots -->
    <circle id="dotRed" r="5" fill="#FF5F57"/>
    <circle id="dotYellow" r="5" fill="#FFBD2E"/>
    <circle id="dotGreen" r="5" fill="#28CA41"/>
  </defs>

  <rect width="1400" height="340" fill="url(#bg)" rx="12"/>
  <rect width="1400" height="340" fill="url(#grid)" rx="12" opacity="0.3"/>
  <rect x="60" y="0" width="1280" height="2" fill="url(#lineGrad)"/>
  <rect x="60" y="338" width="1280" height="2" fill="url(#lineGrad)"/>

  <!-- HUD corners -->
  <path d="M12 12 L12 45 M12 12 L45 12" stroke="#7B3FE4" stroke-width="2" opacity="0.5"/>
  <path d="M1388 12 L1388 45 M1388 12 L1355 12" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <path d="M12 328 L12 295 M12 328 L45 328" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <path d="M1388 328 L1388 295 M1388 328 L1355 328" stroke="#7B3FE4" stroke-width="2" opacity="0.5"/>

  <!-- LEFT SIDE: Title + Metrics -->
  <text x="100" y="65" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="600" fill="url(#titleGrad)" letter-spacing="-1">SINator</text>
  <text x="100" y="95" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="400" fill="#71717A" letter-spacing="0.5">Fireworks AI Key Pool</text>
  <rect x="101" y="106" width="240" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>
  <text x="100" y="140" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500" fill="#00D9FF" letter-spacing="0.3">Never hit a rate limit again</text>

  <!-- 3 Metric Cards — Clean, Minimalist -->
  <text x="100" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#F4F4F5" letter-spacing="-1">484</text>
  <text x="100" y="222" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">API KEYS</text>
  <rect x="100" y="232" width="60" height="1" fill="#7B3FE4" opacity="0.4"/>

  <text x="280" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#F4F4F5" letter-spacing="-1">10</text>
  <text x="280" y="222" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">PROXIES</text>
  <rect x="280" y="232" width="60" height="1" fill="#A855F7" opacity="0.4"/>

  <text x="440" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#F4F4F5" letter-spacing="-1">12</text>
  <text x="440" y="222" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">MODELS</text>
  <rect x="440" y="232" width="60" height="1" fill="#00D9FF" opacity="0.4"/>

  <!-- Quick Start Code Card -->
  <rect x="100" y="260" width="420" height="46" rx="8" fill="#0D1117" stroke="#21262D" stroke-width="1"/>
  <!-- Terminal dots -->
  <circle cx="118" cy="275" r="5" fill="#FF5F57"/>
  <circle cx="133" cy="275" r="5" fill="#FFBD2E"/>
  <circle cx="148" cy="275" r="5" fill="#28CA41"/>
  <!-- Command text -->
  <text x="168" y="289" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="13" font-weight="400" fill="#7D8590">$ pip install -r requirements.txt &amp;&amp; python start.py</text>

  <!-- Vertical divider -->
  <rect x="680" y="40" width="1" height="260" fill="#7B3FE4" opacity="0.15"/>

  <!-- RIGHT SIDE: Animated Architecture Flow -->
  <text x="720" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525B" letter-spacing="3">ARCHITECTURE</text>

  <!-- Clients -->
  <rect x="720" y="85" width="120" height="36" rx="8" fill="#0F1923" stroke="#00D9FF" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="108" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#00D9FF">Clients</text>

  <line x1="780" y1="124" x2="780" y2="145" stroke="#3F3F46" stroke-width="2"/>
  <polygon points="776,142 780,148 784,142" fill="#3F3F46" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="124" r="3" fill="#00D9FF" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="124;145" dur="1s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Router -->
  <rect x="720" y="150" width="120" height="36" rx="8" fill="#0F1923" stroke="#A855F7" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="173" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#A855F7">Router</text>

  <line x1="780" y1="189" x2="780" y2="210" stroke="#3F3F46" stroke-width="2"/>
  <polygon points="776,207 780,213 784,207" fill="#3F3F46" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="189" r="3" fill="#A855F7" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="189;210" dur="1s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 10 Proxies -->
  <rect x="720" y="215" width="120" height="36" rx="8" fill="#0F1923" stroke="#00D9FF" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="238" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#00D9FF">10 Proxies</text>

  <line x1="780" y1="254" x2="780" y2="275" stroke="#3F3F46" stroke-width="2"/>
  <polygon points="776,272 780,278 784,272" fill="#3F3F46" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="2.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="254" r="3" fill="#00D9FF" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="254;275" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Backend -->
  <rect x="720" y="280" width="120" height="36" rx="8" fill="#0F1923" stroke="#A855F7" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="303" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#A855F7">Backend</text>

  <line x1="845" y1="298" x2="895" y2="298" stroke="#3F3F46" stroke-width="2"/>
  <polygon points="892,294 898,298 892,302" fill="#3F3F46" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="3.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="845" cy="298" r="3" fill="#A855F7" filter="url(#glow)" opacity="0">
    <animate attributeName="cx" values="845;895" dur="1s" begin="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Fireworks AI -->
  <rect x="900" y="280" width="140" height="36" rx="8" fill="#0F1923" stroke="#00D9FF" stroke-width="2" stroke-opacity="0.7">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="4s" begin="3.5s" repeatCount="indefinite"/>
  </rect>
  <text x="970" y="303" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700" fill="#00D9FF">Fireworks AI</text>

  <!-- Decorative hex grid -->
  <rect x="1100" y="40" width="1" height="260" fill="#7B3FE4" opacity="0.1"/>

  <polygon points="1130,80 1142,74 1154,80 1154,92 1142,98 1130,92" fill="#7B3FE4" opacity="0.1" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1165,80 1177,74 1189,80 1189,92 1177,98 1165,92" fill="#00D9FF" opacity="0.1" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1200,80 1212,74 1224,80 1224,92 1212,98 1200,92" fill="#4F46E5" opacity="0.08" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1147,108 1159,102 1171,108 1171,120 1159,126 1147,120" fill="#00D9FF" opacity="0.12" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="1182,108 1194,102 1206,108 1206,120 1194,126 1182,120" fill="#7B3FE4" opacity="0.1" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1130,136 1142,130 1154,136 1154,148 1142,154 1130,148" fill="#4F46E5" opacity="0.08" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1165,136 1177,130 1189,136 1189,148 1177,154 1165,148" fill="#7B3FE4" opacity="0.12" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="1200,136 1212,130 1224,136 1224,148 1212,154 1200,148" fill="#00D9FF" opacity="0.1" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1147,164 1159,158 1171,164 1171,176 1159,182 1147,176" fill="#00D9FF" opacity="0.15" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.35"/>
  <polygon points="1182,164 1194,158 1206,164 1206,176 1194,182 1182,176" fill="#7B3FE4" opacity="0.12" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.3"/>
  <polygon points="1260,80 1272,74 1284,80 1284,92 1272,98 1260,92" fill="#4F46E5" opacity="0.06" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1295,80 1307,74 1319,80 1319,92 1307,98 1295,92" fill="#7B3FE4" opacity="0.08" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1277,108 1289,102 1301,108 1301,120 1289,126 1277,120" fill="#00D9FF" opacity="0.08" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1260,136 1272,130 1284,136 1284,148 1272,154 1260,148" fill="#7B3FE4" opacity="0.08" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1295,136 1307,130 1319,136 1319,148 1307,154 1295,148" fill="#00D9FF" opacity="0.08" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.2"/>

  <circle cx="1159" cy="170" r="14" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.2">
    <animate attributeName="r" values="14;26;14" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0;0.25" dur="3s" repeatCount="indefinite"/>
  </circle>

  <rect x="0" y="0" width="1400" height="1" fill="#00D9FF" opacity="0.15">
    <animate attributeName="y" values="0;340;0" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.25;0" dur="12s" repeatCount="indefinite"/>
  </rect>
</svg>
