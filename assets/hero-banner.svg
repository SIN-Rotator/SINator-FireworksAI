<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1120"/>
      <stop offset="0.4" stop-color="#0F172A"/>
      <stop offset="0.8" stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="100" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.6" stop-color="#E2E8F0"/>
      <stop offset="1" stop-color="#94A3B8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B3FE4"/>
      <stop offset="1" stop-color="#00A8D8"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1400" y2="0">
      <stop stop-color="#7B3FE4" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#00A8D8" stop-opacity="0.5"/>
      <stop offset="0.85" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeCyan" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="nodeShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.8" fill="#475569"/>
      <line x1="25" y1="0" x2="25" y2="50" stroke="#475569" stroke-width="0.3"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#475569" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="1400" height="380" fill="url(#bg)" rx="12"/>
  <rect width="1400" height="380" fill="url(#grid)" rx="12" opacity="0.2"/>
  <rect x="60" y="0" width="1280" height="2" fill="url(#lineGrad)"/>
  <rect x="60" y="378" width="1280" height="2" fill="url(#lineGrad)"/>

  <path d="M12 12 L12 45 M12 12 L45 12" stroke="#7B3FE4" stroke-width="2" opacity="0.4"/>
  <path d="M1388 12 L1388 45 M1388 12 L1355 12" stroke="#00A8D8" stroke-width="2" opacity="0.4"/>
  <path d="M12 368 L12 335 M12 368 L45 368" stroke="#00A8D8" stroke-width="2" opacity="0.4"/>
  <path d="M1388 368 L1388 335 M1388 368 L1355 368" stroke="#7B3FE4" stroke-width="2" opacity="0.4"/>

  <!-- LEFT SIDE -->
  <text x="100" y="70" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="600" fill="url(#titleGrad)" letter-spacing="-1">SINator</text>
  <text x="100" y="100" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="400" fill="#94A3B8" letter-spacing="0.5">Fireworks AI Key Pool</text>
  <rect x="101" y="111" width="240" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>
  <text x="100" y="145" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500" fill="#00A8D8" letter-spacing="0.3">Never hit a rate limit again</text>

  <!-- ∞ API Keys -->
  <text x="100" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-1">∞</text>
  <text x="100" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8" letter-spacing="2">API KEYS</text>
  <rect x="100" y="242" width="60" height="1" fill="#7B3FE4" opacity="0.4"/>
  <text x="280" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="-1">10</text>
  <text x="280" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8" letter-spacing="2">PROXIES</text>
  <rect x="280" y="242" width="60" height="1" fill="#8B5CF6" opacity="0.4"/>
  <text x="440" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="-1">12</text>
  <text x="440" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#94A3B8" letter-spacing="2">MODELS</text>
  <rect x="440" y="242" width="60" height="1" fill="#00A8D8" opacity="0.4"/>

  <g filter="url(#cardShadow)">
    <rect x="100" y="275" width="480" height="52" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <rect x="100" y="275" width="480" height="22" rx="10" fill="#0F172A"/>
    <rect x="100" y="287" width="480" height="10" fill="#0F172A"/>
    <circle cx="118" cy="286" r="5" fill="#FF5F57"/>
    <circle cx="133" cy="286" r="5" fill="#FFBD2E"/>
    <circle cx="148" cy="286" r="5" fill="#28CA41"/>
    <text x="175" y="290" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#94A3B8">Terminal</text>
    <text x="118" y="314" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="400" fill="#E2E8F0"><tspan fill="#00A8D8">$</tspan> pip install -r requirements.txt &amp;&amp; python start.py</text>
  </g>

  <!-- VERTICAL SEPARATOR -->
  <rect x="680" y="40" width="1" height="320" fill="#7B3FE4" opacity="0.15"/>

  <!-- RIGHT SIDE: Architecture -->
  <text x="720" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#64748B" letter-spacing="3">ARCHITECTURE</text>
  <rect x="720" y="68" width="80" height="1" fill="#7B3FE4" opacity="0.3"/>

  <!-- Column 1: 3 nodes max -->
  <!-- Clients Node -->
  <g filter="url(#nodeShadow)">
    <rect x="710" y="90" width="140" height="44" rx="10" fill="url(#nodeCyan)" stroke="#00A8D8" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="4s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="780" y="117" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00A8D8">Clients</text>
  </g>

  <!-- Connection: Clients → Router -->
  <line x1="780" y1="137" x2="780" y2="165" stroke="#00A8D8" stroke-width="2" stroke-dasharray="4 3" stroke-opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="776,162 780,168 784,162" fill="#00A8D8" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="137" r="3" fill="#00A8D8" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="137;165" dur="1s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Router Node -->
  <g filter="url(#nodeShadow)">
    <rect x="710" y="170" width="140" height="44" rx="10" fill="url(#nodePurple)" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="4s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="780" y="197" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8B5CF6">Router</text>
  </g>

  <!-- Connection: Router → 10 Proxies -->
  <line x1="780" y1="217" x2="780" y2="245" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 3" stroke-opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="776,242 780,248 784,242" fill="#8B5CF6" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="217" r="3" fill="#8B5CF6" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="217;245" dur="1s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 10 Proxies Node -->
  <g filter="url(#nodeShadow)">
    <rect x="710" y="250" width="140" height="44" rx="10" fill="url(#nodeCyan)" stroke="#00A8D8" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <text x="780" y="277" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00A8D8">10 Proxies</text>
  </g>

  <!-- Connection: 10 Proxies → Fireworks AI (goes right to column 2, TOP) -->
  <line x1="853" y1="272" x2="900" y2="117" stroke="#00A8D8" stroke-width="2" stroke-dasharray="4 3" stroke-opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="897,120 903,117 897,114" fill="#00A8D8" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="2.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="853" cy="272" r="3" fill="#00A8D8" filter="url(#glow)" opacity="0">
    <animate attributeName="cx" values="853;900" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="272;117" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Column 2: Fireworks AI (TOP) + Backend (BOTTOM) -->
  <!-- Fireworks AI Node (prominent, same size, TOP) -->
  <g filter="url(#fireGlow)">
    <rect x="905" y="90" width="140" height="44" rx="10" fill="url(#nodeCyan)" stroke="#00A8D8" stroke-width="2" stroke-opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="3.5s" repeatCount="indefinite"/>
    </rect>
    <text x="975" y="117" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#00A8D8">Fireworks AI</text>
  </g>

  <!-- Connection: Fireworks AI → Backend (vertical down) -->
  <line x1="975" y1="137" x2="975" y2="245" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 3" stroke-opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.4s" repeatCount="indefinite"/>
  </line>
  <polygon points="971,242 975,248 979,242" fill="#8B5CF6" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="3.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="975" cy="137" r="3" fill="#8B5CF6" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="137;245" dur="0.8s" begin="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Backend Node (same size, BOTTOM) -->
  <g filter="url(#nodeShadow)">
    <rect x="905" y="250" width="140" height="44" rx="10" fill="url(#nodePurple)" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="4s" begin="3s" repeatCount="indefinite"/>
    </rect>
    <text x="975" y="277" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8B5CF6">Backend</text>
  </g>

  <!-- RIGHT PANEL: Hex Grid -->
  <rect x="1110" y="50" width="1" height="310" fill="#7B3FE4" opacity="0.1"/>

  <!-- Hex Grid -->
  <polygon points="1140,90 1152,84 1164,90 1164,102 1152,108 1140,102" fill="#7B3FE4" opacity="0.08" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.25"/>
  <polygon points="1175,90 1187,84 1199,90 1199,102 1187,108 1175,102" fill="#00A8D8" opacity="0.08" stroke="#00A8D8" stroke-width="0.8" stroke-opacity="0.25"/>
  <polygon points="1157,118 1169,112 1181,118 1181,130 1169,136 1157,130" fill="#00A8D8" opacity="0.1" stroke="#00A8D8" stroke-width="0.8" stroke-opacity="0.3"/>
  <polygon points="1140,146 1152,140 1164,146 1164,158 1152,164 1140,158" fill="#7B3FE4" opacity="0.1" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.3"/>
  <polygon points="1175,146 1187,140 1199,146 1199,158 1187,164 1175,158" fill="#00A8D8" opacity="0.08" stroke="#00A8D8" stroke-width="0.8" stroke-opacity="0.25"/>
  <polygon points="1157,174 1169,168 1181,174 1181,186 1169,192 1157,186" fill="#00A8D8" opacity="0.12" stroke="#00A8D8" stroke-width="1" stroke-opacity="0.35"/>
  <polygon points="1225,90 1237,84 1249,90 1249,102 1237,108 1225,102" fill="#4F46E5" opacity="0.06" stroke="#4F46E5" stroke-width="0.8" stroke-opacity="0.15"/>
  <polygon points="1260,90 1272,84 1284,90 1284,102 1272,108 1260,102" fill="#7B3FE4" opacity="0.06" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.15"/>
  <polygon points="1242,118 1254,112 1266,118 1266,130 1254,136 1242,130" fill="#00A8D8" opacity="0.06" stroke="#00A8D8" stroke-width="0.8" stroke-opacity="0.15"/>
  <polygon points="1225,146 1237,140 1249,146 1249,158 1237,164 1225,158" fill="#7B3FE4" opacity="0.06" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.15"/>
  <polygon points="1260,146 1272,140 1284,146 1284,158 1272,164 1260,158" fill="#00A8D8" opacity="0.06" stroke="#00A8D8" stroke-width="0.8" stroke-opacity="0.15"/>
  <polygon points="1242,174 1254,168 1266,174 1266,186 1254,192 1242,186" fill="#7B3FE4" opacity="0.1" stroke="#7B3FE4" stroke-width="1" stroke-opacity="0.25"/>
  <polygon points="1140,210 1152,204 1164,210 1164,222 1152,228 1140,222" fill="#7B3FE4" opacity="0.06" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.15"/>
  <polygon points="1175,210 1187,204 1199,210 1199,222 1187,228 1175,222" fill="#00A8D8" opacity="0.06" stroke="#00A8D8" stroke-width="0.8" stroke-opacity="0.15"/>
  <polygon points="1225,210 1237,204 1249,210 1249,222 1237,228 1225,222" fill="#4F46E5" opacity="0.05" stroke="#4F46E5" stroke-width="0.8" stroke-opacity="0.12"/>
  <polygon points="1260,210 1272,204 1284,210 1284,222 1272,228 1260,222" fill="#7B3FE4" opacity="0.05" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.12"/>

  <!-- Pulse ring -->
  <circle cx="1169" cy="180" r="14" fill="none" stroke="#00A8D8" stroke-width="1.5" opacity="0.2">
    <animate attributeName="r" values="14;28;14" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.25;0;0.25" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Scanning line -->
  <rect x="1110" y="0" width="290" height="1" fill="#00A8D8" opacity="0.1">
    <animate attributeName="y" values="0;380;0" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.15;0" dur="12s" repeatCount="indefinite"/>
  </rect>
</svg>
