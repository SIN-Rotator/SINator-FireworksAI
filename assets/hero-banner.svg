<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0E14"/>
      <stop offset="0.4" stop-color="#0D1520"/>
      <stop offset="0.8" stop-color="#101926"/>
      <stop offset="1" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="100" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F4F5"/>
      <stop offset="0.6" stop-color="#E4E4E7"/>
      <stop offset="1" stop-color="#A1A1AA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B3FE4"/>
      <stop offset="1" stop-color="#00D9FF"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1400" y2="0">
      <stop stop-color="#7B3FE4" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#7B3FE4" stop-opacity="0.5"/>
      <stop offset="0.5" stop-color="#00D9FF" stop-opacity="0.6"/>
      <stop offset="0.85" stop-color="#7B3FE4" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeCyan" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101E2A"/>
      <stop offset="1" stop-color="#0A1218"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#15101F"/>
      <stop offset="1" stop-color="#0E0A16"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00D9FF" flood-opacity="0.08"/>
    </filter>
    <pattern id="grid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.8" fill="#1A2332"/>
      <line x1="25" y1="0" x2="25" y2="50" stroke="#1A2332" stroke-width="0.3"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#1A2332" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="1400" height="380" fill="url(#bg)" rx="12"/>
  <rect width="1400" height="380" fill="url(#grid)" rx="12" opacity="0.3"/>
  <rect x="60" y="0" width="1280" height="2" fill="url(#lineGrad)"/>
  <rect x="60" y="378" width="1280" height="2" fill="url(#lineGrad)"/>

  <!-- HUD corners -->
  <path d="M12 12 L12 45 M12 12 L45 12" stroke="#7B3FE4" stroke-width="2" opacity="0.5"/>
  <path d="M1388 12 L1388 45 M1388 12 L1355 12" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <path d="M12 368 L12 335 M12 368 L45 368" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <path d="M1388 368 L1388 335 M1388 368 L1355 368" stroke="#7B3FE4" stroke-width="2" opacity="0.5"/>

  <!-- ===== LEFT SIDE ===== -->
  <text x="100" y="70" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="600" fill="url(#titleGrad)" letter-spacing="-1">SINator</text>
  <text x="100" y="100" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="400" fill="#71717A" letter-spacing="0.5">Fireworks AI Key Pool</text>
  <rect x="101" y="111" width="240" height="2" fill="url(#accent)" rx="1" opacity="0.6"/>
  <text x="100" y="145" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500" fill="#00D9FF" letter-spacing="0.3">Never hit a rate limit again</text>

  <!-- Metrics -->
  <text x="100" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#F4F4F5" letter-spacing="-1">484</text>
  <text x="100" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">API KEYS</text>
  <rect x="100" y="242" width="60" height="1" fill="#7B3FE4" opacity="0.4"/>
  <text x="280" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#F4F4F5" letter-spacing="-1">10</text>
  <text x="280" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">PROXIES</text>
  <rect x="280" y="242" width="60" height="1" fill="#A855F7" opacity="0.4"/>
  <text x="440" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#F4F4F5" letter-spacing="-1">12</text>
  <text x="440" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">MODELS</text>
  <rect x="440" y="242" width="60" height="1" fill="#00D9FF" opacity="0.4"/>

  <!-- Terminal Code Card -->
  <g filter="url(#cardShadow)">
    <rect x="100" y="275" width="480" height="52" rx="10" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
    <rect x="100" y="275" width="480" height="22" rx="10" fill="#161B22"/>
    <rect x="100" y="287" width="480" height="10" fill="#161B22"/>
    <circle cx="118" cy="286" r="5" fill="#FF5F57"/>
    <circle cx="133" cy="286" r="5" fill="#FFBD2E"/>
    <circle cx="148" cy="286" r="5" fill="#28CA41"/>
    <text x="175" y="290" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#8B949E">Terminal</text>
    <text x="118" y="314" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="400" fill="#7D8590"><tspan fill="#00D9FF">$</tspan> pip install -r requirements.txt &amp;&amp; python start.py</text>
  </g>

  <!-- Vertical divider -->
  <rect x="680" y="40" width="1" height="320" fill="#7B3FE4" opacity="0.15"/>

  <!-- ===== RIGHT SIDE: Architecture ===== -->
  <text x="720" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#52525B" letter-spacing="3">ARCHITECTURE</text>
  <rect x="720" y="68" width="80" height="1" fill="#7B3FE4" opacity="0.3"/>

  <!-- Node 1: Clients -->
  <rect x="710" y="90" width="140" height="44" rx="10" fill="url(#nodeCyan)" stroke="#00D9FF" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="117" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00D9FF">Clients</text>

  <!-- Connection 1 -->
  <line x1="780" y1="137" x2="780" y2="165" stroke="#00D9FF" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.35">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="776,162 780,168 784,162" fill="#3F3F46" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="137" r="3" fill="#00D9FF" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="137;165" dur="1s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Node 2: Router -->
  <rect x="710" y="170" width="140" height="44" rx="10" fill="url(#nodePurple)" stroke="#A855F7" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="197" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#A855F7">Router</text>

  <!-- Connection 2 -->
  <line x1="780" y1="217" x2="780" y2="245" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.35">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="776,242 780,248 784,242" fill="#3F3F46" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="217" r="3" fill="#A855F7" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="217;245" dur="1s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Node 3: 10 Proxies -->
  <rect x="710" y="250" width="140" height="44" rx="10" fill="url(#nodeCyan)" stroke="#00D9FF" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="277" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00D9FF">10 Proxies</text>

  <!-- Connection 3 -->
  <line x1="780" y1="297" x2="780" y2="325" stroke="#00D9FF" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.35">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="776,322 780,328 784,322" fill="#3F3F46" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="2.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="297" r="3" fill="#00D9FF" filter="url(#glow)" opacity="0">
    <animate attributeName="cy" values="297;325" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Node 4: Backend -->
  <rect x="710" y="330" width="110" height="38" rx="10" fill="url(#nodePurple)" stroke="#A855F7" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <text x="765" y="354" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="600" fill="#A855F7">Backend</text>

  <!-- Horizontal arrow Backend → Fireworks -->
  <line x1="825" y1="349" x2="875" y2="349" stroke="#A855F7" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.35">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.4s" repeatCount="indefinite"/>
  </line>
  <polygon points="872,345 878,349 872,353" fill="#3F3F46" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="3.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="825" cy="349" r="3" fill="#A855F7" filter="url(#glow)" opacity="0">
    <animate attributeName="cx" values="825;875" dur="0.8s" begin="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Node 5: Fireworks AI (prominent endpoint) -->
  <rect x="880" y="328" width="160" height="42" rx="10" fill="url(#nodeCyan)" stroke="#00D9FF" stroke-width="2" stroke-opacity="0.7" filter="url(#fireGlow)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="3.5s" repeatCount="indefinite"/>
  </rect>
  <text x="960" y="354" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#00D9FF">Fireworks AI</text>

  <!-- Hex grid (right of architecture) -->
  <rect x="1110" y="50" width="1" height="310" fill="#7B3FE4" opacity="0.08"/>
  <polygon points="1140,90 1152,84 1164,90 1164,102 1152,108 1140,102" fill="#7B3FE4" opacity="0.08" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1175,90 1187,84 1199,90 1199,102 1187,108 1175,102" fill="#00D9FF" opacity="0.08" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1157,118 1169,112 1181,118 1181,130 1169,136 1157,130" fill="#00D9FF" opacity="0.10" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1140,146 1152,140 1164,146 1164,158 1152,164 1140,158" fill="#7B3FE4" opacity="0.10" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1175,146 1187,140 1199,146 1199,158 1187,164 1175,158" fill="#00D9FF" opacity="0.08" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1157,174 1169,168 1181,174 1181,186 1169,192 1157,186" fill="#00D9FF" opacity="0.12" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.3"/>
  <polygon points="1225,90 1237,84 1249,90 1249,102 1237,108 1225,102" fill="#4F46E5" opacity="0.06" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1260,90 1272,84 1284,90 1284,102 1272,108 1260,102" fill="#7B3FE4" opacity="0.06" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1242,118 1254,112 1266,118 1266,130 1254,136 1242,130" fill="#00D9FF" opacity="0.06" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1225,146 1237,140 1249,146 1249,158 1237,164 1225,158" fill="#7B3FE4" opacity="0.06" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1260,146 1272,140 1284,146 1284,158 1272,164 1260,158" fill="#00D9FF" opacity="0.06" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1242,174 1254,168 1266,174 1266,186 1254,192 1242,186" fill="#7B3FE4" opacity="0.08" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.2"/>
  <polygon points="1140,210 1152,204 1164,210 1164,222 1152,228 1140,222" fill="#7B3FE4" opacity="0.06" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1175,210 1187,204 1199,210 1199,222 1187,228 1175,222" fill="#00D9FF" opacity="0.06" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1225,210 1237,204 1249,210 1249,222 1237,228 1225,222" fill="#4F46E5" opacity="0.04" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.1"/>
  <polygon points="1260,210 1272,204 1284,210 1284,222 1272,228 1260,222" fill="#7B3FE4" opacity="0.04" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.1"/>
  <circle cx="1169" cy="180" r="14" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.15">
    <animate attributeName="r" values="14;24;14" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Scanning line -->
  <rect x="0" y="0" width="1400" height="1" fill="#00D9FF" opacity="0.12">
    <animate attributeName="y" values="0;380;0" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.2;0" dur="12s" repeatCount="indefinite"/>
  </rect>
</svg>
