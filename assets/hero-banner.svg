<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0E14"/>
      <stop offset="0.3" stop-color="#0D1520"/>
      <stop offset="0.7" stop-color="#101926"/>
      <stop offset="1" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="180" y1="0" x2="500" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F4F5"/>
      <stop offset="0.5" stop-color="#E4E4E7"/>
      <stop offset="1" stop-color="#A1A1AA"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B3FE4"/>
      <stop offset="1" stop-color="#00D9FF"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1200" y2="0">
      <stop stop-color="#7B3FE4" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#00D9FF" stop-opacity="0.5"/>
      <stop offset="0.8" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </linearGradient>
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="numGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="logoAura" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#7B3FE4" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="metricGlow" cx="0.5" cy="0.5" r="0.6">
      <stop stop-color="#00D9FF" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1A2332"/>
      <line x1="20" y1="0" x2="20" y2="40" stroke="#1A2332" stroke-width="0.5"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="#1A2332" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)" rx="12"/>
  <rect width="1200" height="280" fill="url(#grid)" rx="12" opacity="0.4"/>
  <rect x="50" y="0" width="1100" height="2" fill="url(#lineGrad)"/>
  <rect x="50" y="278" width="1100" height="2" fill="url(#lineGrad)"/>

  <!-- HUD corners -->
  <path d="M12 12 L12 40 M12 12 L40 12" stroke="#7B3FE4" stroke-width="2" opacity="0.5"/>
  <path d="M1188 12 L1188 40 M1188 12 L1160 12" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <path d="M12 268 L12 240 M12 268 L40 268" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <path d="M1188 268 L1188 240 M1188 268 L1160 268" stroke="#7B3FE4" stroke-width="2" opacity="0.5"/>

  <!-- Logo -->
  <circle cx="70" cy="55" r="50" fill="url(#logoAura)"/>
  <image href="" x="40" y="25" width="60" height="60" filter="url(#logoGlow)"/>

  <!-- Title: SINator -->
  <text x="120" y="50" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="600" fill="url(#titleGrad)" letter-spacing="-0.5">SINator</text>

  <!-- Subtitle -->
  <text x="120" y="74" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="400" fill="#71717A" letter-spacing="0.5">Fireworks AI Key Pool</text>

  <!-- Accent underline -->
  <rect x="121" y="82" width="200" height="2" fill="url(#accent)" rx="1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="120" y="108" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="500" fill="#00D9FF" letter-spacing="0.5">Never hit a rate limit again</text>

  <!-- 3 Metric cards -->
  <!-- Card 1: 484 Keys -->
  <rect x="120" y="140" width="120" height="60" rx="8" fill="#0F1923" stroke="#1E2D3D" stroke-width="1"/>
  <rect x="120" y="140" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
  <text x="180" y="170" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700" fill="#00D9FF" filter="url(#numGlow)">484</text>
  <text x="180" y="190" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#71717A" letter-spacing="1">API KEYS</text>

  <!-- Card 2: 10 Proxies -->
  <rect x="255" y="140" width="120" height="60" rx="8" fill="#0F1923" stroke="#1E2D3D" stroke-width="1"/>
  <rect x="255" y="140" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
  <text x="315" y="170" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700" fill="#A855F7" filter="url(#numGlow)">10</text>
  <text x="315" y="190" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#71717A" letter-spacing="1">PROXIES</text>

  <!-- Card 3: 12 Models -->
  <rect x="390" y="140" width="120" height="60" rx="8" fill="#0F1923" stroke="#1E2D3D" stroke-width="1"/>
  <rect x="390" y="140" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.4"/>
  <text x="450" y="170" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="28" font-weight="700" fill="#00D9FF" filter="url(#numGlow)">12</text>
  <text x="450" y="190" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="500" fill="#71717A" letter-spacing="1">MODELS</text>

  <!-- Quick start hint -->
  <text x="120" y="235" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="12" font-weight="400" fill="#3F3F46">$ pip install -r requirements.txt &amp;&amp; python start.py</text>

  <!-- Right side: Mini architecture flow -->
  <!-- Section divider -->
  <rect x="560" y="30" width="1" height="220" fill="#7B3FE4" opacity="0.15"/>
  <text x="580" y="50" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" fill="#52525B" letter-spacing="2">ARCHITECTURE</text>

  <!-- Flow nodes -->
  <!-- Clients -->
  <rect x="580" y="65" width="80" height="28" rx="6" fill="#0F1923" stroke="#00D9FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="620" y="83" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" fill="#00D9FF">Clients</text>

  <!-- Arrow down -->
  <path d="M620 96 L620 108 M616 104 L620 108 L624 104" stroke="#3F3F46" stroke-width="1.5" fill="none"/>

  <!-- Router -->
  <rect x="580" y="115" width="80" height="28" rx="6" fill="#0F1923" stroke="#A855F7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="620" y="133" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" fill="#A855F7">Router</text>

  <!-- Arrow down -->
  <path d="M620 146 L620 158 M616 154 L620 158 L624 154" stroke="#3F3F46" stroke-width="1.5" fill="none"/>

  <!-- 10 Proxies (compact) -->
  <rect x="580" y="165" width="80" height="28" rx="6" fill="#0F1923" stroke="#00D9FF" stroke-width="1" stroke-opacity="0.4"/>
  <text x="620" y="183" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" fill="#00D9FF">10 Proxies</text>

  <!-- Arrow down -->
  <path d="M620 196 L620 208 M616 204 L620 208 L624 204" stroke="#3F3F46" stroke-width="1.5" fill="none"/>

  <!-- Backend -->
  <rect x="580" y="215" width="80" height="28" rx="6" fill="#0F1923" stroke="#A855F7" stroke-width="1" stroke-opacity="0.5"/>
  <text x="620" y="233" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" fill="#A855F7">Backend</text>

  <!-- Horizontal arrow to Fireworks -->
  <path d="M665 229 L700 229 M696 225 L700 229 L696 233" stroke="#3F3F46" stroke-width="1.5" fill="none"/>

  <!-- Fireworks -->
  <rect x="705" y="215" width="90" height="28" rx="6" fill="#0F1923" stroke="#00D9FF" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="750" y="233" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="700" fill="#00D9FF">Fireworks AI</text>

  <!-- Right side: hex grid decoration (same as footer) -->
  <polygon points="960,60 970,55 980,60 980,70 970,75 960,70" fill="#7B3FE4" opacity="0.12" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="990,60 1000,55 1010,60 1010,70 1000,75 990,70" fill="#00D9FF" opacity="0.12" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="1020,60 1030,55 1040,60 1040,70 1030,75 1020,70" fill="#4F46E5" opacity="0.08" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="975,85 985,80 995,85 995,95 985,100 975,90" fill="#00D9FF" opacity="0.16" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.4"/>
  <polygon points="1005,85 1015,80 1025,85 1025,95 1015,100 1005,90" fill="#7B3FE4" opacity="0.12" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="960,110 970,105 980,110 980,120 970,125 960,120" fill="#4F46E5" opacity="0.10" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="990,110 1000,105 1010,110 1010,120 1000,125 990,120" fill="#7B3FE4" opacity="0.14" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.4"/>
  <polygon points="1020,110 1030,105 1040,110 1040,120 1030,125 1020,120" fill="#00D9FF" opacity="0.12" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="975,135 985,130 995,135 995,145 985,150 975,145" fill="#00D9FF" opacity="0.20" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <polygon points="1005,135 1015,130 1025,135 1025,145 1015,150 1005,145" fill="#7B3FE4" opacity="0.16" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Pulse ring -->
  <circle cx="985" cy="140" r="12" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.25">
    <animate attributeName="r" values="12;22;12" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Even more hexes further right -->
  <polygon points="1080,60 1090,55 1100,60 1100,70 1090,75 1080,70" fill="#4F46E5" opacity="0.08" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1110,60 1120,55 1130,60 1130,70 1120,75 1110,70" fill="#7B3FE4" opacity="0.10" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1095,85 1105,80 1115,85 1115,95 1105,100 1095,95" fill="#00D9FF" opacity="0.10" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1080,110 1090,105 1100,110 1100,120 1090,125 1080,120" fill="#7B3FE4" opacity="0.10" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1110,110 1120,105 1130,110 1130,120 1120,125 1110,120" fill="#00D9FF" opacity="0.10" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- Vertical accent line before hex grid -->
  <rect x="925" y="30" width="1" height="220" fill="#7B3FE4" opacity="0.12"/>

  <!-- Scanning line -->
  <rect x="0" y="0" width="1200" height="1" fill="#00D9FF" opacity="0.2">
    <animate attributeName="y" values="0;280;0" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.3;0" dur="10s" repeatCount="indefinite"/>
  </rect>
</svg>
