<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380" fill="none">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1400" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFAFA"/>
      <stop offset="0.4" stop-color="#F4F4F5"/>
      <stop offset="0.8" stop-color="#E4E4E7"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="titleGradL" x1="100" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18181B"/>
      <stop offset="0.6" stop-color="#27272A"/>
      <stop offset="1" stop-color="#52525B"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B3FE4"/>
      <stop offset="1" stop-color="#00A8D8"/>
    </linearGradient>
    <linearGradient id="lineGradL" x1="0" y1="0" x2="1400" y2="0">
      <stop stop-color="#7B3FE4" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#00A8D8" stop-opacity="0.5"/>
      <stop offset="0.85" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeCyanL" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="nodePurpleL" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
    <filter id="glowL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireGlowL" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadowL" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <filter id="nodeShadowL" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <pattern id="gridL" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.8" fill="#D4D4D8"/>
      <line x1="25" y1="0" x2="25" y2="50" stroke="#D4D4D8" stroke-width="0.3"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#D4D4D8" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="1400" height="380" fill="url(#bgL)" rx="12"/>
  <rect width="1400" height="380" fill="url(#gridL)" rx="12" opacity="0.2"/>
  <rect x="60" y="0" width="1280" height="2" fill="url(#lineGradL)"/>
  <rect x="60" y="378" width="1280" height="2" fill="url(#lineGradL)"/>

  <path d="M12 12 L12 45 M12 12 L45 12" stroke="#7B3FE4" stroke-width="2" opacity="0.4"/>
  <path d="M1388 12 L1388 45 M1388 12 L1355 12" stroke="#00A8D8" stroke-width="2" opacity="0.4"/>
  <path d="M12 368 L12 335 M12 368 L45 368" stroke="#00A8D8" stroke-width="2" opacity="0.4"/>
  <path d="M1388 368 L1388 335 M1388 368 L1355 368" stroke="#7B3FE4" stroke-width="2" opacity="0.4"/>

  <!-- LEFT SIDE -->
  <text x="100" y="70" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="600" fill="url(#titleGradL)" letter-spacing="-1">SINator</text>
  <text x="100" y="100" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="400" fill="#71717A" letter-spacing="0.5">Fireworks AI Key Pool</text>
  <rect x="101" y="111" width="240" height="2" fill="url(#accentL)" rx="1" opacity="0.6"/>
  <text x="100" y="145" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500" fill="#00A8D8" letter-spacing="0.3">Never hit a rate limit again</text>

  <!-- ∞ API Keys -->
  <text x="100" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="700" fill="#18181B" letter-spacing="-1">∞</text>
  <text x="100" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">API KEYS</text>
  <rect x="100" y="242" width="60" height="1" fill="#7B3FE4" opacity="0.4"/>
  <text x="280" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#18181B" letter-spacing="-1">10</text>
  <text x="280" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">PROXIES</text>
  <rect x="280" y="242" width="60" height="1" fill="#8B5CF6" opacity="0.4"/>
  <text x="440" y="210" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#18181B" letter-spacing="-1">12</text>
  <text x="440" y="232" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">MODELS</text>
  <rect x="440" y="242" width="60" height="1" fill="#00A8D8" opacity="0.4"/>

  <g filter="url(#cardShadowL)">
    <rect x="100" y="275" width="480" height="52" rx="10" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1"/>
    <rect x="100" y="275" width="480" height="22" rx="10" fill="#F4F4F5"/>
    <rect x="100" y="287" width="480" height="10" fill="#F4F4F5"/>
    <circle cx="118" cy="286" r="5" fill="#FF5F57"/>
    <circle cx="133" cy="286" r="5" fill="#FFBD2E"/>
    <circle cx="148" cy="286" r="5" fill="#28CA41"/>
    <text x="175" y="290" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#71717A">Terminal</text>
    <text x="118" y="314" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="400" fill="#52525B"><tspan fill="#00A8D8">$</tspan> pip install -r requirements.txt &amp;&amp; python start.py</text>
  </g>

  <!-- VERTICAL SEPARATOR -->
  <rect x="680" y="40" width="1" height="320" fill="#7B3FE4" opacity="0.15"/>

  <!-- RIGHT SIDE: Architecture -->
  <text x="760" y="60" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="3">ARCHITECTURE</text>
  <rect x="760" y="68" width="80" height="1" fill="#7B3FE4" opacity="0.3"/>

  <!-- Column 1: Client Flow (3 nodes max) -->
  <!-- Clients Node -->
  <g filter="url(#nodeShadowL)">
    <rect x="740" y="90" width="140" height="44" rx="10" fill="url(#nodeCyanL)" stroke="#00A8D8" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="4s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <text x="810" y="117" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00A8D8">Clients</text>
  </g>

  <!-- Connection: Clients → Router -->
  <line x1="810" y1="137" x2="810" y2="165" stroke="#00A8D8" stroke-width="2" stroke-dasharray="4 3" stroke-opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="806,162 810,168 814,162" fill="#00A8D8" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="810" cy="137" r="3" fill="#00A8D8" filter="url(#glowL)" opacity="0">
    <animate attributeName="cy" values="137;165" dur="1s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Router Node -->
  <g filter="url(#nodeShadowL)">
    <rect x="740" y="170" width="140" height="44" rx="10" fill="url(#nodePurpleL)" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="4s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="810" y="197" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8B5CF6">Router</text>
  </g>

  <!-- Connection: Router → 10 Proxies -->
  <line x1="810" y1="217" x2="810" y2="245" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="4 3" stroke-opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="806,242 810,248 814,242" fill="#8B5CF6" opacity="0.7">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="810" cy="217" r="3" fill="#8B5CF6" filter="url(#glowL)" opacity="0">
    <animate attributeName="cy" values="217;245" dur="1s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 10 Proxies Node -->
  <g filter="url(#nodeShadowL)">
    <rect x="740" y="250" width="140" height="44" rx="10" fill="url(#nodeCyanL)" stroke="#00A8D8" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="stroke-opacity" values="0.4;0.9;0.4" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <text x="810" y="277" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00A8D8">10 Proxies</text>
  </g>

  <!-- Connection: 10 Proxies → Backend (S-curve: away → up → right) -->
  <path d="M 880 272 C 900 272, 880 192, 900 192" stroke="#00A8D8" stroke-width="3" stroke-dasharray="4 3" stroke-opacity="0.6" fill="none" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" repeatCount="indefinite"/>
  </path>
  <polygon points="900,189 905,192 900,195" fill="#00A8D8" opacity="0.9">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="2.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="880" cy="272" r="3" fill="#00A8D8" filter="url(#glowL)" opacity="0">
    <animate attributeName="cx" values="880;900;900" dur="1.2s" begin="2.5s" repeatCount="indefinite" keyTimes="0;0.5;1"/>
    <animate attributeName="cy" values="272;272;192" dur="1.2s" begin="2.5s" repeatCount="indefinite" keyTimes="0;0.5;1"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="1.2s" begin="2.5s" repeatCount="indefinite" keyTimes="0;0.1;0.8;1"/>
  </circle>

  <!-- Column 2: Backend (Pool) -->
  <g filter="url(#nodeShadowL)">
    <rect x="900" y="170" width="140" height="44" rx="10" fill="url(#nodePurpleL)" stroke="#8B5CF6" stroke-width="2" stroke-opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="3s" repeatCount="indefinite"/>
    </rect>
    <text x="970" y="197" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#8B5CF6">Backend</text>
  </g>

  <!-- Connection: Backend → Fireworks AI (horizontal right) -->
  <line x1="1040" y1="192" x2="1060" y2="192" stroke="#00A8D8" stroke-width="3" stroke-dasharray="4 3" stroke-opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.3s" repeatCount="indefinite"/>
  </line>
  <polygon points="1060,189 1065,192 1060,195" fill="#00A8D8" opacity="0.9">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="4s" begin="3.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="1040" cy="192" r="3" fill="#00A8D8" filter="url(#glowL)" opacity="0">
    <animate attributeName="cx" values="1040;1060" dur="0.6s" begin="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.6s" begin="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Column 3: Fireworks AI (API Generation) -->
  <g filter="url(#fireGlowL)">
    <rect x="1060" y="170" width="140" height="44" rx="10" fill="url(#nodeCyanL)" stroke="#00A8D8" stroke-width="2" stroke-opacity="0.8">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" begin="4s" repeatCount="indefinite"/>
    </rect>
    <text x="1130" y="197" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#00A8D8">Fireworks AI</text>
  </g>

</svg>
