<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="340" viewBox="0 0 1400 340" fill="none">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1400" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFAFA"/>
      <stop offset="0.4" stop-color="#F4F4F5"/>
      <stop offset="0.8" stop-color="#E4E4E7"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="titleGradL" x1="100" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#18181B"/>
      <stop offset="0.6" stop-color="#27272A"/>
      <stop offset="1" stop-color="#52525B"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B3FE4"/>
      <stop offset="1" stop-color="#00A8D8"/>
    </linearGradient>
    <linearGradient id="lineGradL" x1="0" y1="0" x2="1400" y2="0">
      <stop stop-color="#7B3FE4" stop-opacity="0"/>
      <stop offset="0.15" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#00A8D8" stop-opacity="0.5"/>
      <stop offset="0.85" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nodeCyanL" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="nodePurpleL" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
    <linearGradient id="nodeFireL" x1="0" y1="0" x2="0" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E4E4E7"/>
    </linearGradient>
    <linearGradient id="archPanelL" x1="0" y1="0" x2="0" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#FAFAFA" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glowL" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fireGlowL" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadowL" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.06"/>
    </filter>
    <pattern id="gridL" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.8" fill="#D4D4D8"/>
      <line x1="25" y1="0" x2="25" y2="50" stroke="#D4D4D8" stroke-width="0.3"/>
      <line x1="0" y1="25" x2="50" y2="25" stroke="#D4D4D8" stroke-width="0.3"/>
    </pattern>
  </defs>

  <rect width="1400" height="340" fill="url(#bgL)" rx="12"/>
  <rect width="1400" height="340" fill="url(#gridL)" rx="12" opacity="0.2"/>
  <rect x="60" y="0" width="1280" height="2" fill="url(#lineGradL)"/>
  <rect x="60" y="338" width="1280" height="2" fill="url(#lineGradL)"/>

  <!-- HUD corners -->
  <path d="M12 12 L12 45 M12 12 L45 12" stroke="#7B3FE4" stroke-width="2" opacity="0.4"/>
  <path d="M1388 12 L1388 45 M1388 12 L1355 12" stroke="#00A8D8" stroke-width="2" opacity="0.4"/>
  <path d="M12 328 L12 295 M12 328 L45 328" stroke="#00A8D8" stroke-width="2" opacity="0.4"/>
  <path d="M1388 328 L1388 295 M1388 328 L1355 328" stroke="#7B3FE4" stroke-width="2" opacity="0.4"/>

  <!-- ===== LEFT SIDE ===== -->
  <text x="100" y="65" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="600" fill="url(#titleGradL)" letter-spacing="-1">SINator</text>
  <text x="100" y="95" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="400" fill="#71717A" letter-spacing="0.5">Fireworks AI Key Pool</text>
  <rect x="101" y="106" width="240" height="2" fill="url(#accentL)" rx="1" opacity="0.6"/>
  <text x="100" y="140" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500" fill="#00A8D8" letter-spacing="0.3">Never hit a rate limit again</text>

  <text x="100" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#18181B" letter-spacing="-1">484</text>
  <text x="100" y="222" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">API KEYS</text>
  <rect x="100" y="232" width="60" height="1" fill="#7B3FE4" opacity="0.4"/>
  <text x="280" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#18181B" letter-spacing="-1">10</text>
  <text x="280" y="222" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">PROXIES</text>
  <rect x="280" y="232" width="60" height="1" fill="#8B5CF6" opacity="0.4"/>
  <text x="440" y="200" font-family="ui-sans-serif, system-ui, sans-serif" font-size="42" font-weight="700" fill="#18181B" letter-spacing="-1">12</text>
  <text x="440" y="222" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#71717A" letter-spacing="2">MODELS</text>
  <rect x="440" y="232" width="60" height="1" fill="#00A8D8" opacity="0.4"/>

  <!-- Terminal Code Card -->
  <g filter="url(#cardShadowL)">
    <rect x="100" y="258" width="480" height="52" rx="10" fill="#FFFFFF" stroke="#E4E4E7" stroke-width="1"/>
    <rect x="100" y="258" width="480" height="22" rx="10" fill="#F4F4F5"/>
    <rect x="100" y="270" width="480" height="10" fill="#F4F4F5"/>
    <circle cx="118" cy="269" r="5" fill="#FF5F57"/>
    <circle cx="133" cy="269" r="5" fill="#FFBD2E"/>
    <circle cx="148" cy="269" r="5" fill="#28CA41"/>
    <text x="175" y="273" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="500" fill="#71717A">Terminal</text>
    <text x="118" y="297" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="14" font-weight="400" fill="#52525B"><tspan fill="#00A8D8">$</tspan> pip install -r requirements.txt &amp;&amp; python start.py</text>
  </g>

  <rect x="680" y="40" width="1" height="260" fill="#7B3FE4" opacity="0.1"/>

  <!-- ===== RIGHT SIDE: Architecture ===== -->
  <rect x="700" y="45" width="400" height="270" rx="12" fill="url(#archPanelL)" stroke="#E4E4E7" stroke-width="1"/>

  <text x="720" y="68" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="600" fill="#A1A1AA" letter-spacing="3">ARCHITECTURE</text>
  <rect x="720" y="74" width="80" height="1" fill="#7B3FE4" opacity="0.2"/>

  <!-- Clients -->
  <rect x="715" y="90" width="130" height="40" rx="10" fill="url(#nodeCyanL)" stroke="#00A8D8" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="0s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="115" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00A8D8">Clients</text>
  <text x="860" y="115" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="400" fill="#A1A1AA">entry</text>

  <line x1="780" y1="133" x2="780" y2="158" stroke="#00A8D8" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="776,155 780,161 784,155" fill="#D4D4D8" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="0.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="133" r="3" fill="#00A8D8" filter="url(#glowL)" opacity="0">
    <animate attributeName="cy" values="133;158" dur="1s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="0.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Router -->
  <rect x="715" y="165" width="130" height="40" rx="10" fill="url(#nodePurpleL)" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="1s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="190" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#8B5CF6">Router</text>
  <text x="860" y="190" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="400" fill="#A1A1AA">failover</text>

  <line x1="780" y1="208" x2="780" y2="233" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" begin="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="776,230 780,236 784,230" fill="#D4D4D8" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="1.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="208" r="3" fill="#8B5CF6" filter="url(#glowL)" opacity="0">
    <animate attributeName="cy" values="208;233" dur="1s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- 10 Proxies -->
  <rect x="715" y="240" width="130" height="40" rx="10" fill="url(#nodeCyanL)" stroke="#00A8D8" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <text x="780" y="265" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600" fill="#00A8D8">10 Proxies</text>
  <text x="860" y="265" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" font-weight="400" fill="#A1A1AA">rotation</text>

  <line x1="780" y1="283" x2="780" y2="293" stroke="#00A8D8" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.5s" repeatCount="indefinite"/>
  </line>
  <polygon points="776,290 780,296 784,290" fill="#D4D4D8" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="2.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="780" cy="283" r="3" fill="#00A8D8" filter="url(#glowL)" opacity="0">
    <animate attributeName="cy" values="283;293" dur="1s" begin="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="1s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Backend (compact) -->
  <rect x="715" y="298" width="100" height="32" rx="8" fill="url(#nodePurpleL)" stroke="#8B5CF6" stroke-width="1.5" stroke-opacity="0.5">
    <animate attributeName="stroke-opacity" values="0.3;0.8;0.3" dur="4s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <text x="765" y="318" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="600" fill="#8B5CF6">Backend</text>

  <line x1="820" y1="314" x2="860" y2="314" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="4 3" stroke-opacity="0.3">
    <animate attributeName="stroke-dashoffset" from="0" to="-7" dur="0.4s" repeatCount="indefinite"/>
  </line>
  <polygon points="857,310 863,314 857,318" fill="#D4D4D8" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="3.5s" repeatCount="indefinite"/>
  </polygon>
  <circle cx="820" cy="314" r="3" fill="#8B5CF6" filter="url(#glowL)" opacity="0">
    <animate attributeName="cx" values="820;860" dur="0.8s" begin="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="0.8s" begin="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Fireworks AI (prominent) -->
  <rect x="865" y="296" width="150" height="36" rx="10" fill="url(#nodeFireL)" stroke="#00A8D8" stroke-width="2" stroke-opacity="0.7" filter="url(#fireGlowL)">
    <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" begin="3.5s" repeatCount="indefinite"/>
  </rect>
  <text x="940" y="318" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#00A8D8">Fireworks AI</text>

  <!-- Hex grid -->
  <rect x="1130" y="50" width="1" height="240" fill="#7B3FE4" opacity="0.06"/>
  <polygon points="1155,80 1167,74 1179,80 1179,92 1167,98 1155,92" fill="#7B3FE4" opacity="0.05" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1190,80 1202,74 1214,80 1214,92 1202,98 1190,92" fill="#00A8D8" opacity="0.05" stroke="#00A8D8" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1172,108 1184,102 1196,108 1196,120 1184,126 1172,120" fill="#00A8D8" opacity="0.06" stroke="#00A8D8" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1155,136 1167,130 1179,136 1179,148 1167,154 1155,148" fill="#7B3FE4" opacity="0.06" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1190,136 1202,130 1214,136 1214,148 1202,154 1190,148" fill="#00A8D8" opacity="0.05" stroke="#00A8D8" stroke-width="0.5" stroke-opacity="0.15"/>
  <polygon points="1172,164 1184,158 1196,164 1196,176 1184,182 1172,176" fill="#00A8D8" opacity="0.08" stroke="#00A8D8" stroke-width="0.8" stroke-opacity="0.25"/>
  <polygon points="1240,80 1252,74 1264,80 1264,92 1252,98 1240,92" fill="#4F46E5" opacity="0.04" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.1"/>
  <polygon points="1275,80 1287,74 1299,80 1299,92 1287,98 1275,92" fill="#7B3FE4" opacity="0.04" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.1"/>
  <polygon points="1257,108 1269,102 1281,108 1281,120 1269,126 1257,120" fill="#00A8D8" opacity="0.04" stroke="#00A8D8" stroke-width="0.5" stroke-opacity="0.1"/>
  <polygon points="1240,136 1252,130 1264,136 1264,148 1252,154 1240,148" fill="#7B3FE4" opacity="0.04" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.1"/>
  <polygon points="1275,136 1287,130 1299,136 1299,148 1287,154 1275,148" fill="#00A8D8" opacity="0.04" stroke="#00A8D8" stroke-width="0.5" stroke-opacity="0.1"/>
  <circle cx="1184" cy="170" r="12" fill="none" stroke="#00A8D8" stroke-width="1" opacity="0.12">
    <animate attributeName="r" values="12;22;12" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>

  <rect x="0" y="0" width="1400" height="1" fill="#00A8D8" opacity="0.08">
    <animate attributeName="y" values="0;340;0" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.12;0" dur="12s" repeatCount="indefinite"/>
  </rect>
</svg>
