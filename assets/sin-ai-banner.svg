<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="200" viewBox="0 0 1200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0E14"/>
      <stop offset="0.3" stop-color="#0D1520"/>
      <stop offset="0.7" stop-color="#101926"/>
      <stop offset="1" stop-color="#0A0E14"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="200" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F4F5"/>
      <stop offset="0.5" stop-color="#E4E4E7"/>
      <stop offset="1" stop-color="#A1A1AA"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7B3FE4"/>
      <stop offset="1" stop-color="#00D9FF"/>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0" y1="0" x2="1200" y2="0">
      <stop stop-color="#7B3FE4" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#00D9FF" stop-opacity="0.5"/>
      <stop offset="0.8" stop-color="#7B3FE4" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </linearGradient>

    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="logoAura" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#7B3FE4" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#7B3FE4" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#1A2332"/>
      <line x1="20" y1="0" x2="20" y2="40" stroke="#1A2332" stroke-width="0.5"/>
      <line x1="0" y1="20" x2="40" y2="20" stroke="#1A2332" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="200" fill="url(#bg)" rx="12"/>
  <rect width="1200" height="200" fill="url(#grid)" rx="12" opacity="0.4"/>

  <!-- Glow lines -->
  <rect x="50" y="0" width="1100" height="2" fill="url(#lineGrad)"/>
  <rect x="50" y="198" width="1100" height="2" fill="url(#lineGrad)"/>

  <!-- HUD corner accents -->
  <path d="M12 12 L12 40 M12 12 L40 12" stroke="#7B3FE4" stroke-width="2" opacity="0.5"/>
  <path d="M1188 12 L1188 40 M1188 12 L1160 12" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <path d="M12 188 L12 160 M12 188 L40 188" stroke="#00D9FF" stroke-width="2" opacity="0.5"/>
  <path d="M1188 188 L1188 160 M1188 188 L1160 188" stroke="#7B3FE4" stroke-width="2" opacity="0.5"/>

  <!-- Logo aura glow -->
  <circle cx="110" cy="100" r="75" fill="url(#logoAura)"/>

  <!-- Logo (embedded PNG) -->
  <image href="./logo.png" x="60" y="50" width="100" height="100" filter="url(#logoGlow)"/>

  <!-- OpenSIN AI text — clean, modern, wide tracking (Stripe/Linear style) -->
  <text x="185" y="85" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="500" fill="url(#textGrad)" letter-spacing="2">OpenSIN AI</text>

  <!-- Accent underline -->
  <rect x="186" y="94" width="160" height="2" fill="url(#accent)" rx="1" opacity="0.5"/>

  <!-- Tagline (English, clean) -->
  <text x="185" y="118" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="15" font-weight="400" fill="#71717A" letter-spacing="0.5">Enterprise AI agents that work autonomously</text>

  <!-- Repo-specific benefits (individuell pro Repo) -->
  <text x="185" y="148" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#00D9FF" letter-spacing="1">484 free API keys</text>
  <text x="320" y="148" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="400" fill="#3F3F46">·</text>
  <text x="335" y="148" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#00D9FF" letter-spacing="1">10-proxy auto-failover</text>
  <text x="510" y="148" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="400" fill="#3F3F46">·</text>
  <text x="525" y="148" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="500" fill="#00D9FF" letter-spacing="1">12 Fireworks models</text>

  <!-- Right side hex grid -->
  <polygon points="1050,55 1060,50 1070,55 1070,65 1060,70 1050,65" fill="#7B3FE4" opacity="0.12" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="1080,55 1090,50 1100,55 1100,65 1090,70 1080,65" fill="#00D9FF" opacity="0.12" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="1110,55 1120,50 1130,55 1130,65 1120,70 1110,65" fill="#4F46E5" opacity="0.08" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.2"/>
  <polygon points="1065,80 1075,75 1085,80 1085,90 1075,95 1065,90" fill="#00D9FF" opacity="0.16" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.4"/>
  <polygon points="1095,80 1105,75 1115,80 1115,90 1105,95 1095,90" fill="#7B3FE4" opacity="0.12" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="1050,105 1060,100 1070,105 1070,115 1060,120 1050,115" fill="#4F46E5" opacity="0.10" stroke="#4F46E5" stroke-width="0.5" stroke-opacity="0.25"/>
  <polygon points="1080,105 1090,100 1100,105 1100,115 1090,120 1080,115" fill="#7B3FE4" opacity="0.14" stroke="#7B3FE4" stroke-width="0.5" stroke-opacity="0.4"/>
  <polygon points="1110,105 1120,100 1130,105 1130,115 1120,120 1110,115" fill="#00D9FF" opacity="0.12" stroke="#00D9FF" stroke-width="0.5" stroke-opacity="0.3"/>
  <polygon points="1065,130 1075,125 1085,130 1085,140 1075,145 1065,140" fill="#00D9FF" opacity="0.20" stroke="#00D9FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <polygon points="1095,130 1105,125 1115,130 1115,140 1105,145 1095,140" fill="#7B3FE4" opacity="0.16" stroke="#7B3FE4" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Pulse ring -->
  <circle cx="1075" cy="135" r="12" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.25">
    <animate attributeName="r" values="12;22;12" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Circuit traces -->
  <path d="M1020 100 L1000 100 L1000 80 L980 80" stroke="#7B3FE4" stroke-width="1" opacity="0.15" fill="none"/>
  <path d="M1020 135 L990 135 L990 155 L970 155" stroke="#00D9FF" stroke-width="1" opacity="0.10" fill="none"/>

  <!-- Accent line -->
  <rect x="1015" y="45" width="1" height="120" fill="#7B3FE4" opacity="0.15"/>

  <!-- Scanning line -->
  <rect x="0" y="0" width="1200" height="1" fill="#00D9FF" opacity="0.25">
    <animate attributeName="y" values="0;200;0" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.35;0" dur="8s" repeatCount="indefinite"/>
  </rect>
</svg>
